
<div *ngIf="cards.length == 0; then emptyView else normalView"></div>

<ng-template #emptyView>
    <app-empty-view [mainLabel]="emptyCardsLabel" [subLabel]="emptyCardsSubLabel"></app-empty-view>
</ng-template>

<ng-template #normalView>
    <div class="scrollable-list" (scroll)="onScroll($event)" fxLayout="column" fxLayoutGap="8px" style="padding: 8px;">
        <div *ngFor="let card of cards" [id]="'card-' + card.id">
            <app-card-tile
                [question]="card.question"
                [answer]="card.answer"
                [isMarked]="card.isMarked"
                [language]="language"
                (tileClicked)="navigateToCard(card.id)"
                (bookmarkClicked)="toggleIsMarked(card)">
            </app-card-tile>
        </div>
    </div>
</ng-template>
