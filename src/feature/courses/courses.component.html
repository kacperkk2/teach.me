<app-courses-header></app-courses-header>

<div *ngIf="(courses$ | async)!.length == 0; then emptyView else normalView"></div>

<ng-template #emptyView>
    <app-empty-view [mainLabel]="emptyCoursesLabel" 
        [subLabel]="emptyCoursesSubLabel" redirectTo="/courses/new" [showButton]="true"></app-empty-view>
</ng-template>

<ng-template #normalView>
    <ng-container *ngIf="lessons$ | async as lessons">
        <div class="courses-list" (scroll)="onScroll($event)">
            <div fxLayout="column" fxLayoutGap="8px" style="padding: 8px;">
                <div *ngFor="let course of courses$ | async">
                    <app-course-tile
                        [name]="course.name"
                        [lessonsCount]="course.lessonsCount"
                        [cardsCount]="course.cardsCount"
                        [lessons]="getLessonsForCourse(course, lessons)"
                        (tileClicked)="navigateToLessons(course.id)"
                        (lessonClicked)="navigateToCards(course.id, $event)">
                    </app-course-tile>
                </div>
            </div>
        </div>

        <app-add-round-button redirectTo="/courses/new" [label]="courseLabel"></app-add-round-button>
    </ng-container>
</ng-template>
