<mat-toolbar fxLayout="row" fxLayoutAlign="space-between center">

    <div fxLayout="row" fxLayoutAlign="center center">
        <mat-icon class="back" (click)="back()"> arrow_back </mat-icon>
        <div fxLayout="column" fxLayoutAlign="center start">
            <span class="context-label">{{ title | uppercase }}</span>
            <span class="course-name">{{ course.name }}</span>
        </div>
    </div>

    <div>
        <button mat-icon-button [matMenuTriggerFor]="lessonsMenu">
            <mat-icon> more_vert </mat-icon>
        </button>

        <mat-menu #lessonsMenu="matMenu" xPosition="before">
            <button mat-menu-item (click)="editCourseClicked()">
                <span> {{ manageCourseLabel | titlecase }} </span>
            </button>
            <button mat-menu-item (click)="exportCourseClicked()">
                <span> {{ exportCourseLabel | titlecase }} </span>
            </button>
            <!-- <button mat-menu-item (click)="turnCourseCards()">
                <span> {{ turnCourseCardsLabel | titlecase }} </span>
            </button> -->
        </mat-menu>

    </div>
</mat-toolbar>
