
<app-manage-lesson-tile
    *ngFor="let lesson of migrationLessons; let i = index"
    [name]="lesson.name"
    [cardsCount]="lesson.cards.length"
    [cards]="getCards(lesson)"
    [markedForDeletion]="isMarkedForDeletion(i)"
    (deleteClicked)="toggleLessonDeletion(i)">
</app-manage-lesson-tile>
