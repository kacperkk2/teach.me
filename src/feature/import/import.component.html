<app-import-header [title]="importTitle" [entityName]="summaryData?.entityName ?? ''"></app-import-header>

<div *ngIf="isImportFail; then importFailView else normalView"></div>

<ng-template #importFailView>
    <app-empty-view [mainLabel]="importFailedReason" [subLabel]="importFailedDescription"></app-empty-view>
</ng-template>

<ng-template #normalView>
    <app-import-lesson *ngIf="migrationType == DataType.LESSON && summaryData"
            [summaryData]="summaryData!" [migrationLessons]="lessonsData" (importLesson)="importLesson($any($event))"></app-import-lesson>
    <app-import-course *ngIf="migrationType == DataType.COURSE && summaryData"
            [summaryData]="summaryData!" [migrationLessons]="lessonsData" (importCourse)="importCourse($any($event))"></app-import-course>
</ng-template>
