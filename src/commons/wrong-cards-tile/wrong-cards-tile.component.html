<div class="tile-wrapper">
    <div class="tile-main" fxLayout="column">
        <div class="card-header" fxLayout="row" fxLayoutAlign="start center">
            <div fxFlex="13" fxLayoutAlign="center center">
                <mat-icon class="side-icon text-light-grey">repeat</mat-icon>
            </div>
            <div fxFlex fxLayout="row" fxLayoutAlign="start center" fxLayoutGap="8px">
                <app-card-icon [count]="wrongCardsCount"></app-card-icon>
                <span class="text-light-grey">Błędne poprzednim razem</span>
            </div>
            <button mat-icon-button color="primary" (click)="wrongClicked.emit()">
                <mat-icon>play_arrow</mat-icon>
            </button>
        </div>
    </div>
</div>
